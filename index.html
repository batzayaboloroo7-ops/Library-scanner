<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library QR Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
  body { font-family: Arial; text-align: center; padding: 20px; }
  #reader { width: 100%; max-width: 400px; margin: 20px auto; }
  select, button { font-size: 16px; padding: 8px 12px; margin: 10px 0; }
  #status { font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<h2>Library QR Scanner</h2>

<label for="action">Select Action:</label>
<select id="action">
  <option value="Borrow">Borrow</option>
  <option value="Return">Return</option>
</select>

<div id="reader"></div>
<p id="status">Scan Student Card</p>

<script>
let student = null;
let book = null;
const webAppUrl = "https://script.google.com/macros/s/AKfycbxGyzvzc85-eMgc8vMpo1ybq-hVJkRECn2oxbes70ptnjWhz5NyuVTUqh_77UuQELV3iQ/exec"; 

let scanner = null;
let cameraId = null;

// Function to send data to server
function sendData() {
  const action = document.getElementById("action").value;
  fetch(webAppUrl, {
    method: "POST",
    body: JSON.stringify({ student, book, action })
  })
  .then(response => response.text())
  .then(data => {
    document.getElementById("status").innerText = `Recorded: ${action} (${student} → ${book})`;
    student = null;
    book = null;
    startStudentScan();
  })
  .catch(err => {
    document.getElementById("status").innerText = "Error sending data!";
    console.error(err);
    startStudentScan();
  });
}

// Function to handle each scan
function onScanSuccess(decodedText) {
  if(decodedText.startsWith("STU")) {
    if(!student) {
      student = decodedText;
      document.getElementById("status").innerText = `Student scanned: ${student}. Now scan Book.`;
      scanner.clear().then(() => startBookScan());
    }
  } else if(decodedText.startsWith("BOOK")) {
    if(!student) {
      document.getElementById("status").innerText = "Scan student first!";
      return;
    }
    book = decodedText;
    scanner.clear().then(() => sendData());
  } else {
    document.getElementById("status").innerText = `Invalid QR: ${decodedText}`;
  }
}

// Start scanning students
function startStudentScan() {
  document.getElementById("status").innerText = "Scan Student Card";
  Html5Qrcode.getCameras().then(cameras => {
    // Choose back camera automatically
    cameraId = cameras.find(cam => cam.label.toLowerCase().includes("back"))?.id || cameras[0].id;
    scanner = new Html5Qrcode("reader");
    scanner.start(cameraId, { fps: 15, qrbox: 250 }, onScanSuccess);
  }).catch(err => console.error(err));
}

// Start scanning books
function startBookScan() {
  document.getElementById("status").innerText = "Scan Book QR";
  Html5Qrcode.getCameras().then(cameras => {
    cameraId = cameras.find(cam => cam.label.toLowerCase().includes("back"))?.id || cameras[0].id;
    scanner = new Html5Qrcode("reader");
    scanner.start(cameraId, { fps: 15, qrbox: 200 }, onScanSuccess);
  }).catch(err => console.error(err));
}

// Initialize scanner on page load
startStudentScan();
</script>

</body>
</html>
