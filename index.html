<!DOCTYPE html>
<html lang="mn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Library QR Scanner</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body { font-family: Arial; text-align: center; padding: 20px; }
#reader { width: 100%; max-width: 400px; margin: 20px auto; }
#status { font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<h2>Library QR Scanner</h2>

<select id="action">
  <option value="Түрээслэх">Түрээслэх</option>
  <option value="Буцаалт">Буцаалт</option>
</select>

<div id="reader"></div>
<p id="status">Сурагчийн карт уншуулна уу</p>

<script>
let student = null;
let book = null;
const webAppUrl = "https://script.google.com/macros/s/AKfycbxGyzvzc85-eMgc8vMpo1ybq-hVJkRECn2oxbes70ptnjWhz5NyuVTUqh_77UuQELV3iQ/exec"; 

let scanner = null;
let cameraId = null;
let mode = "student";

// Function to send data asynchronously, after showing success
function sendData() {
  const action = document.getElementById("action").value;

  // Show success message first
  document.getElementById("status").innerText = "Амжилттай бүртгэгдлээ.";

  // Delay restarting scanner so user sees the message
  setTimeout(() => {
    student = null;
    book = null;
    startStudentScan();
  }, 10000); // 1.2 second delay

  // Send data in background
  fetch(webAppUrl, {
    method: "POST",
    body: JSON.stringify({ student, book, action })
  })
  .then(response => response.text())
  .catch(err => console.error("Error sending data:", err));
}

// Start scanning Student
function startStudentScan() {
  mode = "student";
  document.getElementById("status").innerText = "Сурагчийн карт уншуулна уу";
  scanner.start(cameraId, { fps: 15, qrbox: 250 }, onScanSuccess);
}

// Start scanning Book
function startBookScan() {
  mode = "book";
  document.getElementById("status").innerText = "Номын QR уншуулна уу";
  scanner.start(cameraId, { fps: 15, qrbox: 200 }, onScanSuccess);
}

function onScanSuccess(decodedText) {
  if(mode === "student" && decodedText.startsWith("STU")) {
    student = decodedText;
    document.getElementById("status").innerText = `Сурагч скан хийгдсэн: ${student}. Одоо ном уншуулна уу.`;
    scanner.stop().then(() => startBookScan());
  } else if(mode === "book" && decodedText.startsWith("BOOK")) {
    if(!student) {
      document.getElementById("status").innerText = "Эхлээд сурагчийн карт уншуулна уу!";
      return;
    }
    book = decodedText;
    scanner.stop().then(() => sendData());
  } else {
    document.getElementById("status").innerText = `Буруу QR: ${decodedText}`;
  }
}

// Initialize scanner once
Html5Qrcode.getCameras().then(cameras => {
  cameraId = cameras.find(cam => cam.label.toLowerCase().includes("back"))?.id || cameras[0].id;
  scanner = new Html5Qrcode("reader");
  startStudentScan();
}).catch(err => console.error(err));

</script>

</body>
</html>
