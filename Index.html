<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Library QR Scanner</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: Arial; padding: 20px; text-align: center; }
    #reader { width: 100%; max-width: 400px; margin: 20px auto; }
    select, button { font-size: 16px; padding: 8px 12px; margin: 10px 0; }
    #status { font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>

<h2>Library QR Scanner</h2>

<label for="action">Select Action:</label>
<select id="action">
  <option value="Borrow">Borrow</option>
  <option value="Return">Return</option>
</select>

<div id="reader"></div>
<p id="status">Scan Student Card</p>
<button id="restartBtn" style="display:none;">Restart Scanner</button>

<script>
let student = null;
let book = null;

// Replace with your Google Apps Script or API endpoint
const webAppUrl = "https://script.google.com/macros/s/AKfycbxGyzvzc85-eMgc8vMpo1ybq-hVJkRECn2oxbes70ptnjWhz5NyuVTUqh_77UuQELV3iQ/exec"; 

function sendData() {
  const action = document.getElementById("action").value;
  fetch(webAppUrl, {
    method: "POST",
    body: JSON.stringify({ student, book, action })
  })
  .then(response => response.text())
  .then(data => {
    document.getElementById("status").innerText = `Recorded: ${action}`;
    student = null;
    book = null;
    restartScanner();
  })
  .catch(err => {
    document.getElementById("status").innerText = "Error sending data!";
    console.error(err);
    restartScanner();
  });
}

function onScanSuccess(decodedText, decodedResult) {
  if(decodedText.startsWith("STU")) {
    student = decodedText;
    document.getElementById("status").innerText = "Student scanned. Now scan book.";
  } else if(decodedText.startsWith("BOOK")) {
    if(!student) {
      document.getElementById("status").innerText = "Scan student first!";
      return;
    }
    book = decodedText;
    sendData();
  } else {
    document.getElementById("status").innerText = `Invalid QR: ${decodedText}`;
  }
}

// Initialize QR scanner
let scanner = new Html5QrcodeScanner(
  "reader",
  { fps: 15, qrbox: 200, rememberLastUsedCamera: true }
);
scanner.render(onScanSuccess);

function restartScanner() {
  scanner.clear().then(() => {
    scanner.render(onScanSuccess);
    document.getElementById("restartBtn").style.display = "none";
    document.getElementById("status").innerText = "Scan Student Card";
  }).catch(err => console.error(err));
}

// Optional restart button for mobile
document.getElementById("restartBtn").addEventListener("click", restartScanner);
</script>

</body>
</html>
